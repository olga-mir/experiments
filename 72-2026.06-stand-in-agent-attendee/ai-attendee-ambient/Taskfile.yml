version: '3'

vars:
  PROJECT_ID:
    sh: gcloud config get-value project 2>/dev/null || echo $GOOGLE_CLOUD_PROJECT

tasks:
  preflight:
    desc: Check required environment variables
    cmds:
      - |
        ERRORS=0
        if [ -z "{{.PROJECT_ID}}" ]; then
          echo "❌ GOOGLE_CLOUD_PROJECT is not set and gcloud is not configured"
          ERRORS=$((ERRORS+1))
        fi
        if [ -z "$SCREENSHOTS_BUCKET_NAME" ]; then
          echo "⚠️  SCREENSHOTS_BUCKET_NAME is not set (screenshots will fail)"
        fi
        if [ -z "$SIMULATION_BASE_URL" ]; then
          echo "⚠️  SIMULATION_BASE_URL is not set (backend simulation calls will fail)"
        fi
        if [ "$ERRORS" -gt 0 ]; then
          exit 1
        fi
        echo "✅ Preflight checks passed (Project: {{.PROJECT_ID}})"

  install:
    desc: Install dependencies
    cmds:
      - agents-cli install --clean

  run:
    desc: Run the ambient agent (one-off prompt)
    deps: [preflight]
    cmds:
      - agents-cli run "{{.CLI_ARGS | default "Perform a sweep of the conference"}}"

  playground:
    desc: Open the ambient agent playground
    deps: [preflight]
    cmds:
      - agents-cli playground

  server:
    desc: Run the FastAPI server locally (enables triggers)
    deps: [preflight]
    cmds:
      - uv run python app/fast_api_app.py

  trigger:
    desc: Locally trigger the ambient agent via Webhook (simulates Cron)
    cmds:
      - |
        curl -X POST http://localhost:8000/apps/ambient_ai_attendee/trigger/webhook \
          -H "Content-Type: application/json" \
          -d '{"message": "tick"}'

  logs:
    desc: Tail recent Reasoning Engine logs (agent stdout/stderr)
    deps: [preflight]
    vars:
      ENGINE_ID: "4092540608256671744"
    cmds:
      - |
        gcloud logging read \
          'resource.type="aiplatform.googleapis.com/ReasoningEngine" AND resource.labels.reasoning_engine_id="{{.ENGINE_ID}}"' \
          --project={{.PROJECT_ID}} \
          --limit={{.CLI_ARGS | default "50"}} \
          --order=asc \
          --format="table(timestamp,textPayload)"

  deploy:
    desc: Deploy the ambient agent to GCP Agent Platform
    deps: [preflight]
    cmds:
      - |
        if [ -z "$SIMULATION_BASE_URL" ]; then
          echo "❌ SIMULATION_BASE_URL is not set"
          exit 1
        fi
        agents-cli deploy --project {{.PROJECT_ID}} --update-env-vars SIMULATION_BASE_URL=$SIMULATION_BASE_URL

  setup:infra:
    desc: Enable APIs, create Service Account, and grant IAM roles for Cloud Scheduler
    deps: [preflight]
    vars:
      SA_NAME: "ambient-attendee-scheduler"
      SA_EMAIL: "{{.SA_NAME}}@{{.PROJECT_ID}}.iam.gserviceaccount.com"
      CLOUD_RUN_SERVICE: "ai-attendee-ambient"
      CLOUD_RUN_REGION: "{{.CLOUD_RUN_REGION | default \"us-east1\"}}"
    cmds:
      - |
        echo "Enabling required GCP APIs..."
        gcloud services enable cloudscheduler.googleapis.com --project={{.PROJECT_ID}}
        gcloud services enable run.googleapis.com --project={{.PROJECT_ID}}
        gcloud services enable aiplatform.googleapis.com --project={{.PROJECT_ID}}
      - |
        if ! gcloud iam service-accounts describe {{.SA_EMAIL}} >/dev/null 2>&1; then
          echo "Creating service account {{.SA_EMAIL}}..."
          gcloud iam service-accounts create {{.SA_NAME}} --display-name="Ambient Attendee Scheduler"
        fi
        echo "Granting Reasoning Engine User role to {{.SA_EMAIL}}..."
        gcloud projects add-iam-policy-binding {{.PROJECT_ID}} \
          --member="serviceAccount:{{.SA_EMAIL}}" \
          --role="roles/aiplatform.user"
      - |
        echo "Granting Cloud Run Invoker role to {{.SA_EMAIL}} on service {{.CLOUD_RUN_SERVICE}}..."
        gcloud run services add-iam-policy-binding {{.CLOUD_RUN_SERVICE}} \
          --member="serviceAccount:{{.SA_EMAIL}}" \
          --role="roles/run.invoker" \
          --region="{{.CLOUD_RUN_REGION}}" \
          --project={{.PROJECT_ID}}

  schedule:
    desc: Schedule the ambient agent to run every 5 minutes using Cloud Scheduler
    deps: [preflight]
    vars:
      SA_EMAIL: "ambient-attendee-scheduler@{{.PROJECT_ID}}.iam.gserviceaccount.com"
      SCHEDULER_LOCATION: "{{.GOOGLE_CLOUD_LOCATION | default \"us-central1\"}}"
    cmds:
      - |
        if [ -z "$AGENT_URL" ]; then
          echo "❌ AGENT_URL environment variable is not set."
          echo "   For Cloud Run:        AGENT_URL=https://<service>.run.app/apps/ambient_ai_attendee/trigger/webhook"
          echo "   For Reasoning Engine: AGENT_URL=https://us-east1-aiplatform.googleapis.com/v1/projects/<NUM>/locations/us-east1/reasoningEngines/<ID>"
          exit 1
        fi

        # Cloud Scheduler OAuth requires .googleapis.com; use OIDC for Cloud Run (.run.app)
        if echo "$AGENT_URL" | grep -q '\.googleapis\.com'; then
          TARGET_URI="${AGENT_URL}:streamQuery"
          AUTH_FLAGS="--oauth-service-account-email={{.SA_EMAIL}} --oauth-token-scope=https://www.googleapis.com/auth/cloud-platform"
          echo "Using OAuth auth (googleapis.com endpoint)"
        else
          TARGET_URI="${AGENT_URL}"
          BASE_URL=$(echo "$AGENT_URL" | sed 's|\(https://[^/]*\).*|\1|')
          AUTH_FLAGS="--oidc-service-account-email={{.SA_EMAIL}} --oidc-token-audience=${BASE_URL}"
          echo "Using OIDC auth (Cloud Run endpoint, audience: ${BASE_URL})"
        fi

        # Check if job exists, if so update, otherwise create
        if gcloud scheduler jobs describe ambient-cron --location="{{.SCHEDULER_LOCATION}}" >/dev/null 2>&1; then
          echo "Updating existing scheduler job..."
          gcloud scheduler jobs update http ambient-cron \
            --schedule="*/5 * * * *" \
            --uri="${TARGET_URI}" \
            --http-method=POST \
            --update-headers="Content-Type=application/json" \
            --message-body='{"input": {"message": "tick", "user_id": "scheduler"}}' \
            ${AUTH_FLAGS} \
            --location="{{.SCHEDULER_LOCATION}}"
        else
          echo "Creating new scheduler job..."
          gcloud scheduler jobs create http ambient-cron \
            --schedule="*/5 * * * *" \
            --uri="${TARGET_URI}" \
            --http-method=POST \
            --headers="Content-Type=application/json" \
            --message-body='{"input": {"message": "tick", "user_id": "scheduler"}}' \
            ${AUTH_FLAGS} \
            --location="{{.SCHEDULER_LOCATION}}"
        fi
