version: '3'

vars:
  GCP_PROJECT_ID: '{{.Env.GCP_PROJECT_ID}}'
  BUCKET_NAME: '{{.Env.SCREENSHOTS_BUCKET_NAME | default (printf "%s-ai-attendee" .Env.GCP_PROJECT_ID)}}'

tasks:
  preflight:
    desc: Check required environment variables
    cmds:
      - |
        ERRORS=0
        if [ -z "{{.GCP_PROJECT_ID}}" ]; then
          echo "❌ GCP_PROJECT_ID environment variable must be set"
          ERRORS=$((ERRORS+1))
        fi
        if [ "$ERRORS" -gt 0 ]; then
          exit 1
        fi
        echo "✅ Preflight checks passed (Project: {{.GCP_PROJECT_ID}})"

  setup-infra:
    desc: Provision GCP infrastructure (idempotent)
    deps: [preflight]
    cmds:
      - bash ./scripts/setup-infra.sh {{.GCP_PROJECT_ID}} {{.BUCKET_NAME}}

  install:
    desc: Install dependencies
    cmds:
      - agents-cli install

  run:
    desc: Run the agent (one-off prompt)
    deps: [preflight]
    cmds:
      - agents-cli run "{{.CLI_ARGS | default "Check current conference status"}}"

  playground:
    desc: Open the agent playground
    deps: [preflight]
    cmds:
      - agents-cli playground

  deploy:
    desc: Deploy the standard agent to GCP Agent Platform
    deps: [preflight]
    cmds:
      - agents-cli deploy
