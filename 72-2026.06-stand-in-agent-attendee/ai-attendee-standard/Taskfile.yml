version: '3'

vars:
  PROJECT_ID:
    sh: gcloud config get-value project 2>/dev/null || echo $GOOGLE_CLOUD_PROJECT

tasks:
  preflight:
    desc: Check required environment variables
    cmds:
      - |
        ERRORS=0
        if [ -z "{{.PROJECT_ID}}" ]; then
          echo "❌ GOOGLE_CLOUD_PROJECT is not set and gcloud is not configured"
          ERRORS=$((ERRORS+1))
        fi
        if [ -z "$SCREENSHOTS_BUCKET_NAME" ]; then
          echo "⚠️  SCREENSHOTS_BUCKET_NAME is not set (screenshots will fail)"
        fi
        if [ "$ERRORS" -gt 0 ]; then
          exit 1
        fi
        echo "✅ Preflight checks passed (Project: {{.PROJECT_ID}})"

  install:
    desc: Install dependencies
    cmds:
      - agents-cli install

  run:
    desc: Run the agent (one-off prompt)
    deps: [preflight]
    cmds:
      - agents-cli run "{{.CLI_ARGS | default "Check current conference status"}}"

  playground:
    desc: Open the agent playground
    deps: [preflight]
    cmds:
      - agents-cli playground

  deploy:
    desc: Deploy the standard agent to GCP Agent Platform
    deps: [preflight]
    cmds:
      - agents-cli deploy
