version: '3'

vars:
  GCP_PROJECT_ID: $GCP_PROJECT_ID
  BUCKET_NAME: $SCREENSHOTS_BUCKET_NAME

tasks:
  preflight:
    desc: Check required environment variables
    preconditions:
      - sh: '[[ -n "$GCP_PROJECT_ID" ]]'
        msg: "Error: GCP_PROJECT_ID environment variable must be set"

  setup-infra:
    desc: Provision GCP infrastructure (idempotent)
    deps: [preflight]
    cmds:
      - bash ./scripts/setup-infra.sh $GCP_PROJECT_ID $SCREENSHOTS_BUCKET_NAME

  install:
    desc: Install dependencies
    cmds:
      - agents-cli install

  run:
    desc: Run the agent (one-off prompt)
    deps: [preflight]
    cmds:
      - agents-cli run "{{.CLI_ARGS | default "Check current conference status"}}"

  playground:
    desc: Open the agent playground
    deps: [preflight]
    cmds:
      - agents-cli playground

  deploy:
    desc: Deploy the standard agent to GCP Agent Platform
    deps: [preflight]
    preconditions:
      - sh: '[[ -n "$SIMULATION_BASE_URL" ]]'
        msg: "Error: SIMULATION_BASE_URL must be set (e.g. the Cloud Run URL of the backend sim)"
    cmds:
      - agents-cli deploy --project $GCP_PROJECT_ID --update-env-vars SIMULATION_BASE_URL=$SIMULATION_BASE_URL
