version: '3'

vars:
  PROJECT_ID:
    sh: gcloud config get-value project 2>/dev/null || echo $GOOGLE_CLOUD_PROJECT

tasks:
  preflight:
    desc: Check required environment variables
    cmds:
      - |
        ERRORS=0
        if [ -z "{{.PROJECT_ID}}" ]; then
          echo "❌ GOOGLE_CLOUD_PROJECT is not set and gcloud is not configured"
          ERRORS=$((ERRORS+1))
        fi
        if [ -z "$SCREENSHOTS_BUCKET_NAME" ]; then
          echo "⚠️  SCREENSHOTS_BUCKET_NAME is not set (screenshots will fail)"
        fi
        if [ "$ERRORS" -gt 0 ]; then
          exit 1
        fi
        echo "✅ Preflight checks passed (Project: {{.PROJECT_ID}})"

  install:
    desc: Install dependencies
    cmds:
      - agents-cli install

  run:standard:
    desc: Run the standard agent (one-off prompt)
    deps: [preflight]
    cmds:
      - agents-cli run --app-name ai_engineer_attendee "{{.CLI_ARGS | default "Check current conference status"}}"

  run:ambient:
    desc: Run the ambient agent (one-off prompt)
    deps: [preflight]
    cmds:
      - agents-cli run --app-name ambient_ai_attendee "{{.CLI_ARGS | default "Perform a sweep of the conference"}}"

  playground:standard:
    desc: Open the standard agent playground
    deps: [preflight]
    cmds:
      - agents-cli playground --app-name ai_engineer_attendee

  playground:ambient:
    desc: Open the ambient agent playground
    deps: [preflight]
    cmds:
      - agents-cli playground --app-name ambient_ai_attendee

  server:
    desc: Run the FastAPI server locally (enables triggers)
    deps: [preflight]
    cmds:
      - uv run python app/fast_api_app.py

  trigger:ambient:
    desc: Locally trigger the ambient agent via Webhook (simulates Cron)
    cmds:
      - |
        curl -X POST http://localhost:8000/apps/ambient_ai_attendee/trigger/webhook \
          -H "Content-Type: application/json" \
          -d '{"message": "tick"}'

  deploy:
    desc: Deploy both agents to GCP Agent Platform (Agent Runtime)
    deps: [preflight]
    cmds:
      - agents-cli deploy

  schedule:ambient:
    desc: Schedule the ambient agent to run every 5 minutes using Cloud Scheduler
    deps: [preflight]
    vars:
      AGENT_URL:
        sh: agents-cli deploy --list --format json | jq -r '.[0].url' 2>/dev/null || echo "<YOUR_AGENT_URL>"
      SVC_ACCT:
        sh: gcloud config get-value account 2>/dev/null
    cmds:
      - |
        if [ "{{.AGENT_URL}}" == "<YOUR_AGENT_URL>" ]; then
          echo "❌ Could not auto-detect Agent URL. Please deploy first or provide AGENT_URL manually."
          exit 1
        fi
        gcloud scheduler jobs create http ambient-cron \
          --schedule="*/5 * * * *" \
          --uri="{{.AGENT_URL}}/apps/ambient_ai_attendee/trigger/webhook" \
          --http-method=POST \
          --message-body='{"tick": "true"}' \
          --oidc-service-account-email="{{.SVC_ACCT}}" \
          --location="{{.GOOGLE_CLOUD_LOCATION | default "us-central1"}}"

  eval:
    desc: Run evaluations
    deps: [preflight]
    cmds:
      - agents-cli eval run
