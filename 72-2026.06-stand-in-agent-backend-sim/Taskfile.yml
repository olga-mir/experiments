version: '3'

tasks:
  preflight:
    desc: Check required environment variables and tools
    cmds:
      - uv --version || (echo "uv is required. Install from https://github.com/astral-sh/uv" && exit 1)
      - gcloud version || (echo "gcloud is required." && exit 1)
      - echo "Preflight checks passed."

  init:
    desc: Initialize the project
    deps: [preflight]
    cmds:
      - uv sync

  run:
    desc: Run the server locally (set SIM_SPEED=60 for fast testing)
    cmds:
      - uv run uvicorn main:app --reload --port 8000

  deploy:
    desc: Deploy the service to Cloud Run using GCP_PROJECT_ID (set SIM_SPEED env var, default 1.0 = real-time)
    preconditions:
      - sh: '[[ -n "$GCP_PROJECT_ID" ]]'
        msg: "Error: GCP_PROJECT_ID environment variable must be set (e.g., GCP_PROJECT_ID=my-project task deploy)"
    cmds:
      - |
        gcloud run deploy mock-transcript-server \
          --source . \
          --region us-central1 \
          --allow-unauthenticated \
          --project $GCP_PROJECT_ID \
          --set-env-vars "SIM_SPEED=${SIM_SPEED:-1.0}" \
          --quiet

  sim-start:
    desc: Start the simulation at real-time speed (set SIM_URL for Cloud Run, defaults to localhost:8000)
    vars:
      URL: '{{.SIM_URL | default "http://localhost:8000"}}'
    cmds:
      - |
        RESP=$(curl -sf -X POST "{{.URL}}/sim/start") || { echo "Error: no response from {{.URL}} — is the server running? Set SIM_URL for Cloud Run."; exit 1; }
        echo "$RESP" | python3 -m json.tool

  sim-start-fast:
    desc: Start the simulation at 60x speed (1 min of content per real second — useful for testing)
    vars:
      URL: '{{.SIM_URL | default "http://localhost:8000"}}'
    cmds:
      - |
        RESP=$(curl -sf -X POST "{{.URL}}/sim/start?speed=60") || { echo "Error: no response from {{.URL}} — is the server running? Set SIM_URL for Cloud Run."; exit 1; }
        echo "$RESP" | python3 -m json.tool

  sim-kill:
    desc: Killswitch — flip stream to idle immediately so the agent stops (use sim-reset to clear)
    vars:
      URL: '{{.SIM_URL | default "http://localhost:8000"}}'
    cmds:
      - |
        RESP=$(curl -sf -X POST "{{.URL}}/sim/kill") || { echo "Error: no response from {{.URL}} — is the server running? Set SIM_URL for Cloud Run."; exit 1; }
        echo "$RESP" | python3 -m json.tool

  sim-reset:
    desc: Reset the simulation back to idle (also clears a killed state)
    vars:
      URL: '{{.SIM_URL | default "http://localhost:8000"}}'
    cmds:
      - |
        RESP=$(curl -sf -X POST "{{.URL}}/sim/reset") || { echo "Error: no response from {{.URL}} — is the server running? Set SIM_URL for Cloud Run."; exit 1; }
        echo "$RESP" | python3 -m json.tool

  sim-status:
    desc: Check current simulation status
    vars:
      URL: '{{.SIM_URL | default "http://localhost:8000"}}'
    cmds:
      - |
        RESP=$(curl -sf "{{.URL}}/streams") || { echo "Error: no response from {{.URL}} — is the server running? Set SIM_URL for Cloud Run."; exit 1; }
        echo "$RESP" | python3 -m json.tool

  setup-infra:
    desc: Enable required GCP APIs and setup IAM permissions for Cloud Run / Cloud Build
    preconditions:
      - sh: '[[ -n "$GCP_PROJECT_ID" ]]'
        msg: "Error: GCP_PROJECT_ID environment variable must be set (e.g., GCP_PROJECT_ID=my-project task setup-infra)"
    cmds:
      - echo "Enabling required APIs..."
      - |
        gcloud services enable \
          run.googleapis.com \
          cloudbuild.googleapis.com \
          artifactregistry.googleapis.com \
          storage.googleapis.com \
          --project $GCP_PROJECT_ID
      - echo "Configuring default Compute service account permissions..."
      - |
        PROJECT_NUMBER=$(gcloud projects describe $GCP_PROJECT_ID --format="value(projectNumber)")
        SA_EMAIL="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
        for role in roles/logging.logWriter roles/storage.objectViewer roles/artifactregistry.writer; do
          gcloud projects add-iam-policy-binding $GCP_PROJECT_ID \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="${role}" \
            --quiet
        done

