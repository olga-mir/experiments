version: '3'

tasks:
  preflight:
    desc: Check required environment variables and tools
    cmds:
      - uv --version || (echo "uv is required. Install from https://github.com/astral-sh/uv" && exit 1)
      - gcloud version || (echo "gcloud is required." && exit 1)
      - echo "Preflight checks passed."

  init:
    desc: Initialize the project
    deps: [preflight]
    cmds:
      - uv sync

  run:
    desc: Run the server locally
    cmds:
      - uv run uvicorn main:app --reload --port 8000

  deploy:
    desc: Deploy the service to Cloud Run using GCP_PROJECT_ID
    preconditions:
      - sh: '[[ -n "$GCP_PROJECT_ID" ]]'
        msg: "Error: GCP_PROJECT_ID environment variable must be set (e.g., GCP_PROJECT_ID=my-project task deploy)"
    cmds:
      - |
        gcloud run deploy mock-transcript-server \
          --source . \
          --region us-central1 \
          --allow-unauthenticated \
          --project $GCP_PROJECT_ID \
          --quiet
